version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      embedded:
        patterns:
          - embedded-hal*
          - embassy-*
      esp:
        patterns:
          - esp-*
      defmt:
        patterns:
          - defmt*

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
